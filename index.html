<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Social Navigation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-container">
        <div class="nav-item active"><i class="fa-brands fa-facebook-f"></i></div>
        <div class="nav-item"><i class="fa-brands fa-twitter"></i></div>
        <div class="nav-item"><i class="fa-brands fa-instagram"></i></div>
        <div class="nav-item"><i class="fa-brands fa-linkedin-in"></i></div>
        <div class="nav-item"><i class="fa-brands fa-github"></i></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
